<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- background: electric yellow -->
  <rect width="1024" height="1024" fill="#FFE600"/>

  <!-- thick black framing rounded square -->
  <rect x="50" y="50" width="924" height="924" rx="96" ry="96"
        fill="none" stroke="#000000" stroke-width="44"/>

  <!-- shadow blocks (drawn first so bars sit on top) -->
  <rect x="230" y="494" width="140" height="420" fill="#000000"/>
  <rect x="470" y="334" width="140" height="580" fill="#000000"/>
  <rect x="710" y="174" width="140" height="740" fill="#000000"/>

  <!-- foreground bars: each offset 28px up-left from its shadow -->
  <rect x="202" y="466" width="140" height="420" fill="#FF38A4" stroke="#000000" stroke-width="14"/>
  <rect x="442" y="306" width="140" height="580" fill="#00E5FF" stroke="#000000" stroke-width="14"/>
  <rect x="682" y="146" width="140" height="740" fill="#39FF14" stroke="#000000" stroke-width="14"/>

  <!-- chunky baseline tick under each bar -->
  <rect x="170" y="900" width="694" height="22" fill="#000000"/>
</svg>
